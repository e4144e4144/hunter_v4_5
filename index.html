<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>死に枠ハンター v4.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ff3b3b;--red2:#ff7070;--green:#00e5a0;
  --bg:#0a0a0f;--card:#16161f;--border:rgba(255,255,255,0.1);
  --muted:rgba(255,255,255,0.45);--text:rgba(255,255,255,0.92);
}
body{font-family:system-ui,'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a0808,#0a0a1a);border-bottom:1px solid rgba(255,59,59,.3);padding:14px 18px;display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.hdr-t{font-size:17px;font-weight:900}.hdr-s{font-size:11px;color:var(--muted)}
.main{padding:18px;max-width:980px;margin:0 auto}
.dz-label{display:block;cursor:pointer}
.dz{border:2px dashed rgba(255,59,59,.45);border-radius:14px;padding:40px 20px;text-align:center;background:rgba(255,59,59,.03);margin-bottom:14px;transition:.15s;pointer-events:none}
.dz-label:hover .dz,.dz-label.over .dz{border-color:var(--red);background:rgba(255,59,59,.09)}
.dz .icon{font-size:42px;margin-bottom:8px}
.dz .t1{font-size:15px;font-weight:700;margin-bottom:4px}
.dz .t2{font-size:12px;color:var(--muted)}
.fitem{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.fst{margin-left:auto;font-size:11px;flex-shrink:0}
.ok{color:var(--green)}.er{color:var(--red2)}.wt{color:var(--muted)}
.clear-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px;display:none;float:right}
.clear-btn:hover{color:var(--red2)}
.ana-btn{display:block;width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:900;cursor:pointer;margin:10px 0 18px;font-family:inherit;transition:opacity .15s}
.ana-btn:disabled{opacity:.35;cursor:not-allowed}
.ana-btn:not(:disabled):hover{background:#e62e2e}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px}
.loading{text-align:center;padding:36px;display:none}
.spin{width:40px;height:40px;border:3px solid rgba(255,59,59,.2);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-s{font-size:12px;color:var(--muted);margin-top:5px}
.results{display:none}
.w3hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.w3badge{background:var(--red);color:#fff;font-size:10px;font-weight:900;padding:3px 9px;border-radius:20px;letter-spacing:1px}
.w3title{font-size:18px;font-weight:900}
.w3grid{display:flex;flex-direction:column;gap:12px}
@media(max-width:580px){.w3grid{grid-template-columns:1fr}}
.wcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;width:100%;box-sizing:border-box}
.wcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
.wrank{font-size:10px;color:var(--red2);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.wrace{font-size:12px;color:var(--muted);margin-bottom:3px}
.wframe{font-size:28px;font-weight:900;color:var(--red);line-height:1;margin-bottom:4px}
.wscore{font-size:11px;color:var(--muted);margin-bottom:9px}
.wreason{font-size:11px;color:rgba(255,107,107,.85);line-height:1.65}
.pprev{background:#0d1117;border:1px solid rgba(99,179,237,.3);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.9;white-space:pre-wrap;word-break:break-all;margin:10px 0;color:#c9d1d9;font-family:"Hiragino Sans","Yu Gothic",monospace}
.cchar{font-size:10px;color:var(--muted);text-align:right;margin-top:4px}
.cchar.over{color:var(--red2)}
.cbtn{width:100%;padding:12px;background:#1d9bf0;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:background .2s}
.cbtn:hover{background:rgba(255,59,59,.25)}
.cbtn.done{background:#17bf63}
.arttl{font-size:14px;font-weight:700;margin-bottom:13px;border-top:1px solid var(--border);padding-top:20px}

/* ── レースカード（詳細スコア表） ── */
.rcard{background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.rchdr{padding:12px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.rchdr:hover{background:rgba(255,255,255,.03)}
.rtag{background:rgba(255,255,255,.08);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;flex-shrink:0}
.rname{font-size:13px;font-weight:700;flex:1}
.dbadge{background:rgba(255,59,59,.2);color:var(--red2);border-radius:20px;font-size:10px;font-weight:700;padding:2px 8px;flex-shrink:0}
.chev{color:var(--muted);font-size:11px;transition:.2s;flex-shrink:0}
.rcard.open .chev{transform:rotate(180deg)}
.rbody{display:none;padding:0 16px 16px}
.rcard.open .rbody{display:block}

/* スコアテーブル */
.stbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.stbl th{background:rgba(255,255,255,.06);padding:6px 8px;text-align:center;font-weight:700;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.stbl th:first-child{text-align:left}
.stbl td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;text-align:center}
.stbl td:first-child{text-align:left}
.stbl tr:last-child td{border-bottom:none}
.stbl tr.dead-row{background:rgba(255,59,59,.1)}
.stbl tr.dead-row td{color:#ff9090}
.stbl tr.dead-row td:first-child{font-weight:700}
.stbl tr.top-row{background:rgba(0,229,160,.07)}
.score-bar{display:flex;align-items:center;gap:4px}
.bar-mini{flex:1;background:rgba(255,255,255,.08);border-radius:3px;height:14px;max-width:80px}
.bar-mini-fill{height:100%;border-radius:3px}
.bd-fill{background:rgba(255,59,59,.6)}
.bt-fill{background:rgba(0,229,160,.5)}
.bn-fill{background:rgba(100,130,210,.45)}
.pace-tag{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;background:rgba(255,255,255,.1)}
.err{background:rgba(255,59,59,.15);border:1px solid rgba(255,59,59,.4);border-radius:9px;padding:12px 16px;font-size:13px;color:var(--red2);margin-bottom:14px;display:none}

/* スコアバー色 */
.bd{background:rgba(255,59,59,.6)}
.bt{background:rgba(0,229,160,.5)}
.bn{background:rgba(100,130,210,.45)}
/* テーブル行スタイル */
.dead-row{background:rgba(255,59,59,.1)}
.dead-row td{color:#ff9090}
.top-row{background:rgba(0,229,160,.07)}
.stbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.stbl tr:last-child td{border-bottom:none}
</style>
</head>

// ===== ユーティリティ =====
function estimatePace(c){
  const v=(c||[]).filter(Boolean);
  if(!v.length)return'不明';
  const fp=v.map(s=>parseInt(s.split('-')[0])).filter(n=>!isNaN(n));
  if(!fp.length)return'不明';
  const avg=fp.reduce((a,b)=>a+b,0)/fp.length;
  const hd=fp.filter(p=>p<=2).length;
  if(avg<=2.5&&hd>=fp.length*0.5)return'逃げ';
  if(avg<=4.5)return'先行';
  if(avg<=9.0)return'差し';
  return'追込';
}
function horseToWaku(n,total){
  const base=Math.floor(total/8),extra=total%8;
  let cum=0;
  for(let w=1;w<=8;w++){cum+=base+(w>8-extra?1:0);if(n<=cum)return w;}
  return 8;
}
function isNameChar(c){
  const cp=c.charCodeAt(0);
  return(cp>=0x3040&&cp<=0x9FFF)||(cp>=0xF900&&cp<=0xFAFF)||(cp>=0x2E80&&cp<=0x2FFF)||cp===0x3005||c==='.';
}
function isName(s){return s.length>=2&&s.length<=8&&[...s].every(isNameChar);}

let pdfjs=null;
async function loadPdfjs(){
  if(pdfjs)return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{
      pdfjs=window['pdfjs-dist/build/pdf'];
      pdfjs.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      res();
    };
    s.onerror=()=>rej(new Error('PDF.jsの読み込みに失敗しました（インターネット接続を確認）'));
    document.head.appendChild(s);
  });
}
async function extractText(file){
  await loadPdfjs();
  const buf=await file.arrayBuffer();
  const pdf=await pdfjs.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    const items=tc.items.filter(it=>it.str).sort((a,b)=>{
      const ay=Math.round(a.transform[5]/5)*5;
      const by=Math.round(b.transform[5]/5)*5;
      return ay!==by?by-ay:a.transform[4]-b.transform[4];
    });
    let prevY=null,prevX=null,prevW=null;
    for(const it of items){
      const y=Math.round(it.transform[5]/5)*5;
      const x=it.transform[4];
      const fontSize=Math.abs(it.transform[0])||12;
      if(prevY!==null&&Math.abs(y-prevY)>3){
        // 行が変わった
        text+='\n';
      } else if(prevY!==null&&prevX!==null&&prevW!==null){
        // 同一行：前アイテム末端と現アイテム開始のギャップでスペース判定
        const gap=x-(prevX+prevW);
        if(gap>fontSize*0.3)text+=' ';
      }
      text+=it.str;
      prevY=y;
      prevX=x;
      prevW=it.width||0;
    }
    text+='\n';
  }
  return text;
}

// ===== パース =====
function parseText(text,filename){
  // ① NFKC正規化
  const normText=text.normalize('NFKC');
  const lines=normText.split(/\n+/).map(l=>l.trim()).filter(Boolean);

  // ② 競馬場・レース番号（PDF左上→ファイル名→テキスト）
  const venueList=['中山','東京','阪神','京都','中京','福島','新潟','小倉','函館','札幌'];
  let venue='',raceNum='',raceTitle='';
  const topText=normText.slice(0,300);
  const headMatch=topText.match(/(中山|東京|阪神|京都|中京|福島|新潟|小倉|函館|札幌)\s*(\d{1,2})R/);
  if(headMatch){venue=headMatch[1];raceNum=headMatch[2]+'R';}
  if(!venue){for(const v of venueList){if(topText.includes(v)){venue=v;break;}}}
  if(!venue&&filename){
    const fm=(filename||'').toLowerCase().replace('.pdf','');
    const fullMap={nakayama:'中山',tokyo:'東京',hanshin:'阪神',kyoto:'京都',
      chukyo:'中京',fukushima:'福島',niigata:'新潟',kokura:'小倉',hakodate:'函館',sapporo:'札幌'};
    for(const[k,v] of Object.entries(fullMap)){if(fm.startsWith(k)){venue=v;break;}}
    if(!venue){
      const shortMap={na:'中山',n:'中山',to:'東京',t:'東京',ha:'阪神',h:'阪神',
        ky:'京都',k:'京都',ch:'中京',c:'中京',fu:'福島',f:'福島',ni:'新潟',ko:'小倉',sa:'札幌'};
      const sk=Object.keys(shortMap).sort((a,b)=>b.length-a.length);
      for(const k of sk){if(fm.startsWith(k)&&(/\d/.test(fm[k.length]||'')||fm.length===k.length)){venue=shortMap[k];break;}}
    }
  }
  if(!raceNum&&filename){const fn=(filename||'').toLowerCase().replace('.pdf','');const fn2=fn.match(/(\d+)$/);if(fn2)raceNum=fn2[1]+'R';}
  if(!raceNum){const rm=normText.slice(0,300).match(/(\d{1,2})R/);if(rm)raceNum=rm[1]+'R';}
  if(!raceNum)raceNum='R';

  // ③ コース
  let dist='',surf='';
  for(const cm of[
    normText.match(/コース\s*(\d{3,4})\s*m\s*(ダート|芝)/),
    normText.match(/(\d{3,4})\s*m[\s・‧](ダート|芝)/),
    normText.match(/(ダート|芝)[\s・‧]*(\d{3,4})\s*m/),
  ]){if(!cm)continue;if(/^\d+$/.test(cm[1])){dist=cm[1]+'m';surf=cm[2].includes('ダ')?'ダート':'芝';}else{surf=cm[1].includes('ダ')?'ダート':'芝';dist=cm[2]+'m';}break;}
  const courseKey=venue+surf+dist;
  const tmTitle=normText.slice(0,500).match(/(\S+(?:ステークス|賞|杯|カップ|特別))/);
  raceTitle=tmTitle?tmTitle[1]:'';
  const raceName=venue+raceNum+(raceTitle?' '+raceTitle:'');
  // raceNumを単体でも保持（タイトル生成用）
  const raceNumOnly=raceNum;
  // 開催日を抽出（例: "2026年 3月29日" → "2026年3月29日"）
  let raceDate='';
  const dateM=normText.slice(0,150).match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
  if(dateM)raceDate=`${dateM[1]}年${dateM[2]}月${dateM[3]}日`;

  // ④ 馬名収集：各行に馬名フラグを付けて「行→馬名」マップを作成
  const skipWords=new Set([
    '馬主名','調教師名','血統','騎手名','馬名','単勝オッズ','性齢','毛色',
    'コースレコード','付加賞','本賞金','戦績','負担重量','馬体重',
    '枠番','馬番','番戦績','前走','前々走',
    '出走取消','競走除外','出走取消','除外','取消',
  ]);
  const horseFullPat=/([ァ-ヶーｦ-ﾟ\u4E00-\u9FFF]{3,})\s+[\d.]+\s+\(\d+番[人気]{1,2}\)/;
  const nameOnlyPat=/^([ァ-ヶーｦ-ﾟ\u4E00-\u9FFF]{3,})(?:\s|$)/;
  const chakusaPat=/^[ァ-ヶーｦ-ﾟ\u4E00-\u9FFF]+\s*\(\d+\.\d+\)(?!\s*\d+番)/;
  const oddsPat=/[\d.]+\s+\(\d+番[人気]{1,2}\)/;

  // 行インデックス→馬名 のマップを構築
  const horseAtLine={};
  let ni=0;
  while(ni<lines.length){
    const l=lines[ni];
    // パターン0: 行頭に枠番/馬番の数字がついている場合（例: 「1 マスグラバイト 32.7...」）
    const lStripped=l.replace(/^\d{1,2}\s+/,'');
    // パターン1: 1行完結「馬名 オッズ (N番人気)」（行頭数字除去版も試みる）
    const m1=horseFullPat.exec(l)||horseFullPat.exec(lStripped);
    if(m1&&!skipWords.has(m1[1])){horseAtLine[ni]=m1[1];ni++;continue;}
    // パターン2: 馬名行 + 後続1〜3行にオッズ OR 出走取消
    const nm=nameOnlyPat.exec(l)||nameOnlyPat.exec(lStripped);
    const isChakusa=chakusaPat.test(l);
    if(nm&&!skipWords.has(nm[1])&&nm[1].length>=3&&!l.includes('/')&&!isChakusa){
      for(let la=1;la<=3;la++){
        if(ni+la<lines.length){
          const nxt=lines[ni+la];
          if(oddsPat.test(nxt)||nxt.includes('取消')||nxt.includes('除外')){
            horseAtLine[ni]=nm[1];break;
          }
        }
      }
      // パターン3: 直前行がオッズのみ行（charレベル抽出で行順が逆転するケース）
      if(horseAtLine[ni]===undefined&&ni>0&&/^[\d.]+\s+\(\d+番[人気]{1,2}\)/.test(lines[ni-1])){
        horseAtLine[ni]=nm[1];
      }
      ni++;continue;
    }
    ni++;
  }

  // ⑤ 騎手名抽出（前後行の「(美浦)/(栗東)」の後 OR 専用▲行 OR 父行自体）
  function extractJockey(lines,fi){
    for(let b=1;b<=4;b++){
      const pi=fi-b;if(pi<0)break;
      const prev=lines[pi];
      const m=prev.match(/[\u4E00-\u9FFF\u2E80-\u2FFF]{2,5}\s*[（(](?:美浦|栗東)[)）]\s+(.+)/);
      if(m){
        const after=m[1].trim();
        const fgn=after.match(/^([A-Z]\.[ァ-ヶー]+)/);if(fgn)return fgn[1];
        // 日本語名のみ抽出して最初の1名（姓名）だけ返す
        const jp=after.replace(/[▲△◇★☆○◎▽]/g,'').split(/\s+/)
          .filter(s=>/^[\u3040-\u9FFF\u2E80-\u2FFF]{1,4}$/.test(s)&&s.length>=1);
        if(jp.length>=2)return jp[0]+jp[1];
        if(jp.length===1)return jp[0];
      }
      const m2=prev.match(/^[▲△◇]?([\u4E00-\u9FFF\u30A0-\u30FF]{2,6})$/);
      if(m2)return m2[1];
    }
    // フォールバック: 父行自体から騎手を取得（タイム前の最後の日本語名）
    const fl=lines[fi].replace(/[▲△◇★☆○◎▽]/g,'');
    const tp=fl.match(/\d:\d\d\.\d/);
    if(tp){
      const before=fl.slice(0,fl.indexOf(tp[0])).trim();
      const af=before.replace(/^[父⽗⽁]\s+\S+\s*/,'').trim();
      if(af){
        const fg=af.match(/^([A-Z]\.[ァ-ヶー]+)/);if(fg)return fg[1];
        const jp=af.split(/\s+/).filter(s=>/^[\u3040-\u9FFF\u2E80-\u2FFF]{1,4}$/.test(s));
        if(jp.length>=2)return jp[0]+jp[1];
        if(jp.length===1)return jp[0];
      }
    }
    return '';
  }

  // ⑥ 父行を基準に馬データ構築
  // 馬名は「父行の直前の馬名行」から取得（インデックス対応ではなく位置ベース）
  const horses=[];
  const fatherIdxs=[];
  lines.forEach((fl,i)=>{if(/^[父⽗⽁]/.test(fl)&&fl.length>4)fatherIdxs.push(i);});
  fatherIdxs.forEach((fi,idx)=>{
    const fl=lines[fi];
    const sm=fl.match(/^[父⽗⽁]\s*(\S+)/);
    const sire=sm?sm[1]:'';
    const jockey=extractJockey(lines,fi);
    // ★v2修正: 父行だけでなく前後20行の成績行からコーナー順位を収集
    const rawC_father=(fl.match(/\b(\d{1,2}(?:-\d{1,2}){1,3})\b/g)||[]);
    const corners_father=rawC_father.filter(c=>c.split('-').every(x=>+x>=1&&+x<=20)).slice(0,4);
    const corners_extra=[];
    const searchStart=Math.max(0,fi-20);
    const searchEnd=Math.min(lines.length-1,fi+3);
    for(let si=searchStart;si<=searchEnd;si++){
      if(si===fi)continue;
      const sl=lines[si];
      if(!/\d:\d\d\.\d/.test(sl))continue;
      const mc=(sl.match(/\b(\d{1,2}(?:-\d{1,2}){1,3})\b/g)||[]);
      mc.filter(c=>c.split('-').every(x=>+x>=1&&+x<=20)).forEach(c=>{
        if(!corners_extra.includes(c))corners_extra.push(c);
      });
    }
    const allCorners=[...corners_father];
    corners_extra.forEach(c=>{if(!allCorners.includes(c))allCorners.push(c);});
    const corners=allCorners.slice(0,8);

    // ★位置ベースで「この父行の直前にある馬名行」を探す（最大15行前）
    let horseName='';
    for(let b=1;b<=15;b++){
      if(fi-b<0)break;
      if(horseAtLine[fi-b]!==undefined){horseName=horseAtLine[fi-b];break;}
    }
    // フォールバック1: 同一行に馬名+オッズがある行を直接スキャン（行頭数字除去も試みる）
    if(!horseName){
      const patHL=/^([ァ-ヶーｦ-ﾟ\u4E00-\u9FFF]{3,})\s+[\d.]+\s+\(\d+番[人気]{1,2}\)/;
      for(let b=1;b<=15;b++){
        if(fi-b<0)break;
        const pl=lines[fi-b];
        const mh=pl.match(patHL)||pl.replace(/^\d{1,2}\s+/,'').match(patHL);
        if(mh){horseName=mh[1];break;}
      }
    }
    // フォールバック2: 馬名のみ行（体重行の直前、かつカタカナ/漢字3文字以上）
    if(!horseName){
      const patNameOnly=/^([ァ-ヶーｦ-ﾟ\u4E00-\u9FFF]{3,})(?:\s|$)/;
      const patWeight=/^\d{3,4}kg/;
      const badPat=/^[父母]|^[0-9]|\/|（|^[▲△◇★☆]/;
      const skipW=new Set([...skipWords,'出走取消','競走除外']);
      for(let b=1;b<=15;b++){
        if(fi-b<0)break;
        const pl=lines[fi-b];
        // 体重行の直前の行が馬名候補
        if(patWeight.test(pl)&&fi-b-1>=0){
          const prev=lines[fi-b-1];
          const nm=patNameOnly.exec(prev);
          if(nm&&!skipW.has(nm[1])&&!badPat.test(prev)&&nm[1].length>=3){
            horseName=nm[1];break;
          }
        }
        // 直接：漢字/カタカナ3文字以上かつ数字/スラッシュなし
        const nm2=patNameOnly.exec(pl);
        if(nm2&&!skipW.has(nm2[1])&&!badPat.test(pl)&&nm2[1].length>=3&&
           !/^\d/.test(pl)&&!/[\/（]/.test(pl.slice(0,15))&&
           !/^[父母]/.test(pl)){
          // 次行または2行後にオッズがある場合のみ採用
          const hasOdds=(fi-b+1<fi&&/[\d.]+\s+\(\d+番[人気]{1,2}\)/.test(lines[fi-b+1]))||
                        (fi-b+2<=fi&&/[\d.]+\s+\(\d+番[人気]{1,2}\)/.test(lines[fi-b+2]||''));
          // 前行にオッズがある場合も採用（逆転レイアウト）
          const hasOddsPrev=fi-b>0&&/^[\d.]+\s+\(\d+番[人気]{1,2}\)/.test(lines[fi-b-1]);
          if(hasOdds||hasOddsPrev){horseName=nm2[1];break;}
        }
      }
    }
    let trainer='';
    for(let b=1;b<=6;b++){
      if(fi-b<0)break;
      const tm3=lines[fi-b].match(/([\u4E00-\u9FFF\u2E80-\u2FFF]{2,5})\s*[(（](?:美浦|栗東)[)）]/);
      if(tm3){trainer=tm3[1];break;}
    }
    // ★v3修正: 単勝オッズ＋人気番号を同時にパース
    // パターンA: 「馬名 オッズ (N番人気)」が1行に収まるケース
    // パターンB: 「馬名」行の次行に「オッズ (N番人気)」が来るケース（PDF行分割）
    let odds=999,ninki=999;
    const patFull=/[\u30A0-\u30FF\u4E00-\u9FFF]{3,}\s+([\d.]+)\s+\((\d+)番[人気]{1,2}\)/;
    const patOddsOnly=/^([\d.]+)\s+\((\d+)番[人気]{1,2}\)/;
    for(let b=1;b<=15;b++){
      if(fi-b<0)break;
      const pl=lines[fi-b];
      // パターンA: 1行完結
      const pmA=pl.match(patFull);
      if(pmA){odds=parseFloat(pmA[1]);ninki=parseInt(pmA[2]);break;}
      // パターンB: オッズのみ行（行頭がオッズ数値で始まる）
      const pmB=pl.match(patOddsOnly);
      if(pmB){odds=parseFloat(pmB[1]);ninki=parseInt(pmB[2]);break;}
    }
    horses.push({name:horseName||`馬${idx+1}`,sire,jockey,trainer,corners,pace:estimatePace(corners),odds,ninki});
  });

  // 登録頭数（除外馬込み）= PDFに記載の最大馬番 → 枠番計算に使う
  let registeredTotal=horses.length;
  const patWU=/^\d\s+(\d{1,2})\s+/;
  lines.forEach(l=>{const m=patWU.exec(l);if(m){const n=parseInt(m[1]);if(n>registeredTotal&&n<=18)registeredTotal=n;}});

  const total=registeredTotal;
  const byWaku={};
  horses.forEach((h,i)=>{const w=horseToWaku(i+1,total);(byWaku[w]=byWaku[w]||[]).push(h);});
  return{raceName,raceNum:raceNumOnly,venue,surf,dist,courseKey,raceDate,horsesByWaku:byWaku,totalHorses:total};
}

// ===== スコア計算 =====
function norm(val,stats,maxpts=20){
  const vs=Object.values(stats);
  if(!vs.length||val==null)return maxpts/2;
  const mn=Math.min(...vs),mx=Math.max(...vs);
  if(mx===mn)return maxpts/2;
  return+((val-mn)/(mx-mn)*maxpts).toFixed(2);
}
function scoreRace(race){
  const db=DB[race.courseKey]||{};
  const ws=db.waku||{},js=db.jockey||{},ts=db.trainer||{},ss=db.sire||{},ps=db.pace||{};
  const avgO=o=>{const v=Object.values(o);return v.length?v.reduce((a,b)=>a+b,0)/v.length:22;};
  const aw=avgO(ws),aj=avgO(js),at=avgO(ts),as2=avgO(ss),ap=avgO(ps);
  const hasW=Object.keys(ws).length>0;
  const frames={};
  for(let w=1;w<=8;w++){
    const hs=race.horsesByWaku[w]||[];
    const wVal=ws[w]??aw;
    const wSc=hasW?norm(wVal,ws):10;
    const hsc=hs.map(h=>{
      const jSc=js[h.jockey]!=null?norm(js[h.jockey],js):10;
      const tSc=ts[h.trainer]!=null?norm(ts[h.trainer],ts):10;
      const sSc=ss[h.sire]!=null?norm(ss[h.sire],ss):10;
      const pSc=ps[h.pace]!=null?norm(ps[h.pace],ps):10;
      const total=+(wSc+jSc+tSc+sSc+pSc).toFixed(1);
      return{...h,wSc,jSc,tSc,sSc,pSc,total,
        jRaw:js[h.jockey],tRaw:ts[h.trainer],sRaw:ss[h.sire],pRaw:ps[h.pace],wRaw:wVal};
    });
    const avg2=hsc.length?+(hsc.reduce((a,h)=>a+h.total,0)/hsc.length).toFixed(1):+(wSc+40).toFixed(1);
    frames[w]={horses:hsc,avg:avg2,wVal,wSc:+wSc.toFixed(1)};
  }
  const avgSc=+(Object.values(frames).reduce((a,f)=>a+f.avg,0)/8).toFixed(1);
  // 死に枠：最低スコア枠を1つだけ選出
  const sortedAvg=Object.entries(frames).sort((a,b)=>a[1].avg-b[1].avg);
  const dead=[+sortedAvg[0][0]];
  const ranked=Object.entries(frames).sort((a,b)=>a[1].avg-b[1].avg);
  return{frames,dead,ranked,avgScore:avgSc,hasData:hasW};
}

function getDangerHorses(race,scored){
  const dead=scored.dead;
  const worst=dead.length?dead[0]:+scored.ranked[0][0];
  const deadFrame=scored.frames[worst];
  if(!deadFrame)return null;
  const horses=deadFrame.horses;
  if(horses.some(h=>(h.odds||999)<=3.9))return null;
  if(!horses.some(h=>{const o=h.odds||999;return o>=4.0&&o<=10.0;}))return null;
  return{waku:worst,wScore:deadFrame.avg};
}

function buildPost(race,scored,rank,waku){
  const medal=['🥇','🥈','🥉'][rank]||'💀';
  const worst=waku;
  const fr=scored.frames[worst];
  const wVal=fr?.wVal!=null?fr.wVal.toFixed(1):'—';
  const dateStr=race.raceDate||'';
  const raceNumStr=race.raceNum||'';
  const venue=race.venue;

  // 所属馬リスト（オッズ付き）
  const horses=fr?.horses||[];
  const horseLines=horses.map(h=>`${h.name} ${h.odds!=null&&h.odds<999?h.odds+'倍':''}`).join(' / ');

  // ハッシュタグ
  const courseTag=(race.courseKey||'').replace(/m$/,'');
  const raceTag=`${venue}${raceNumStr}`;

  return`${medal}【死に枠】${dateStr} ${venue} ${raceNumStr} ${race.surf||''}${race.dist||''}

${worst}枠、要注意。
複勝率${wVal}%。

${horseLines}

それでも買いますか？
#競馬 #死に枠 #${venue} #${raceTag} #${courseTag}`;
}

  clearBtn.style.display='none';
  fi.value='';
}

async function runAnalysis(){
  if(!allFiles.length){showErr('PDFファイルを追加してください');return;}
  anaBtn.disabled=true;
  loading.style.display='block';
  results.style.display='none';
  allParsed=[];
  for(let i=0;i<allFiles.length;i++){
    const f=allFiles[i];
    ldS.textContent=`${f.name} (${i+1}/${allFiles.length})`;
    setSt(i,'解析中...','wt');
    try{
      const text=await extractText(f);
      const race=parseText(text,f.name);
      if(!race.totalHorses)throw new Error('馬データを検出できませんでした');
      const scored=scoreRace(race);
      allParsed.push({race,scored});
      // ★デバッグ: 各馬のodds/ninki と 死に枠フィルター結果をコンソール出力
      const worst=scored.dead.length?scored.dead[0]:+scored.ranked[0][0];
      const fr=scored.frames[worst];
      const fh=fr?.horses||[];
      console.group(`[${race.raceName}] コース:${race.courseKey} ${race.totalHorses}頭`);
      Object.entries(scored.frames).sort((a,b)=>+a[0]-+b[0]).forEach(([w,f])=>{
        f.horses.forEach(h=>console.log(`  ${w}枠 ${h.name} odds=${h.odds} ninki=${h.ninki} score=${h.total}`));
      });
      const c2=!fh.some(h=>(h.odds||999)<=3.9);
      const c3=fh.some(h=>{const o=h.odds||999;return o>=4.0&&o<=10.0;});
      const c4=fh.filter(h=>(h.ninki||999)<=5).length<2;
      const c5=fr?.avg<36;
      console.log(`死に枠候補: ${worst}枠 avg=${fr?.avg} c②=${c2} c③=${c3} c④=${c4} c⑤=${c5} → ${c2&&c3&&c4&&c5?'★認定':'除外'}`);
      console.groupEnd();
      const note=race.courseKey&&DB[race.courseKey]?'':`（DB未登録: ${race.courseKey||'?'}）`;
      setSt(i,`✓ ${race.courseKey||'不明'} ${race.totalHorses}頭${note}`,'ok');
    }catch(e){
      setSt(i,'❌ '+e.message,'er');
      console.error(f.name,e);
    }
  }
  loading.style.display='none';
  if(!allParsed.length){showErr('解析できたレースがありません');anaBtn.disabled=false;return;}
  renderResults();
  anaBtn.disabled=false;
}

// ===== 結果レンダリング =====
function renderResults(){
  results.style.display='block';

  // ── フェーズ1: 全PDF精査 ──
  // 仮死に枠 = 各レースの最低スコア枠
  // 本死に枠 条件:
  //   ① 14頭立て以上
  //   ② 仮死に枠に3.9倍以下の馬がいない
  //   ③ 4.0〜10.0倍の馬が1頭以上いる
  qualified=[];
  allParsed.forEach(({race,scored})=>{
    // 条件① 14頭立て以上
    if(race.totalHorses<14)return;

    // スコアワースト順に全枠を試みる（最低枠がNGでも次の枠を検討）
    const ranked=scored.ranked; // スコア昇順
    for(const [wStr] of ranked){
      const worst=+wStr;
      const fr=scored.frames[worst];
      if(!fr)continue;
      const horses=fr.horses||[];

      // 条件② 3.9倍以下の馬がいたら除外
      if(horses.some(h=>(h.odds||999)<=3.9))continue;

      // 条件③ 4.0〜10.0倍の馬が1頭以上いる
      if(!horses.some(h=>{const o=h.odds||999;return o>=4.0&&o<=10.0;}))continue;

      // ★v3追加条件④ 5番人気以内の馬が2頭以上いたら除外
      if(horses.filter(h=>(h.ninki||999)<=5).length>=2)continue;

      // ★v4追加条件⑤ 死に枠スコアが36点以上なら除外
      if(fr.avg>=36)continue;

      // 全条件通過 → この枠を死に枠として採用（1レース1枠）
      qualified.push({race,scored,waku:worst,score:fr.avg,wVal:fr.wVal});
      break;
    }
  });

  // ── フェーズ2: スコアワースト順で10レース選出 ──
  qualified.sort((a,b)=>a.score-b.score);
  const top10=qualified.slice(0,10);

  // ── フェーズ3: ワースト10を全てXポストカードで表示 ──
  const grid=document.getElementById('w3grid');
  grid.innerHTML='';

  if(top10.length===0){
    grid.innerHTML='<p style="color:var(--muted);padding:20px;text-align:center">条件を満たす死に枠が見つかりませんでした<br>（14頭立て以上 ＋ 死に枠に4〜10倍の馬が必要）</p>';
  } else {
    // ランクラベル
    const rankLabel=['🥇','🥈','🥉','4位','5位','6位','7位','8位','9位','10位'];
    top10.forEach(({race,scored,waku,score,wVal},i)=>{
      const postText=buildPost(race,scored,i,waku);
      const cnt=[...postText].length;
      const div=document.createElement('div');
      div.className='wcard';
      div.innerHTML=`
        <div class="wrank">${rankLabel[i]||`${i+1}位`}【死に枠速報】</div>
        <div class="wrace">${race.raceName}</div>
        <div class="wframe">${waku}枠</div>
        <div class="wscore">${race.courseKey} ${race.totalHorses}頭</div>
        <div class="wreason">枠複勝率 ${wVal!=null?wVal.toFixed(1):'?'}%</div>
        <div style="font-size:10px;color:rgba(255,255,255,.3);margin:4px 0 6px">※オッズはPDF取得時点のもの</div>
        <div class="pprev"></div>
        <div class="cchar ${cnt>280?'over':''}">${cnt}文字</div>
        <button class="cbtn">𝕏 コピー</button>`;
      div.querySelector('.pprev').textContent=postText;
      div.querySelector('.cbtn').addEventListener('click',function(){
        const copy=t=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);};
        (navigator.clipboard?navigator.clipboard.writeText(postText).catch(()=>copy(postText)):Promise.resolve().then(()=>copy(postText)))
          .finally(()=>{this.textContent='✓ コピー完了！';this.classList.add('done');setTimeout(()=>{this.textContent='𝕏 コピー';this.classList.remove('done');},2000);});
      });
      grid.appendChild(div);
    });
  }

  // ── フェーズ4: 死に枠認定レースのみ表示（スコアなし）──
  const allrEl=document.getElementById('allr');
  allrEl.innerHTML='';
  const wEmojiD=['','⬜','⬛','🟥','🟦','🟨','🟩','🟧','🔳'];
  // top10のみ表示（死に枠認定済みレースだけ）
  top10.forEach(({race,scored,waku},di)=>{
    const fr=scored.frames[waku];
    const horses=fr?.horses||[];
    const horseRows=horses.map(h=>{
      const oddsStr=h.odds!=null&&h.odds<999?`${h.odds}倍`:'';
      const ninkiStr=h.ninki!=null&&h.ninki<999?`${h.ninki}番人気`:'';
      return `<div style="display:flex;align-items:center;gap:10px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.05)">
        <span style="font-size:18px;line-height:1">${wEmojiD[waku]||'⬜'}</span>
        <span style="font-size:13px;font-weight:700;color:#ff8080">${waku}枠</span>
        <span style="font-size:13px;color:rgba(255,255,255,.88)">${h.name}</span>
        <span style="font-size:12px;color:rgba(255,255,255,.5)">${ninkiStr} ${oddsStr}</span>
      </div>`;
    }).join('');
    const cardId=`rcard-${di}`;
    const div=document.createElement('div');
    div.className='rcard';
    div.id=cardId;
    div.innerHTML=`
      <div class="rchdr" onclick="this.parentElement.classList.toggle('open')">
        <span class="rtag">${race.courseKey||'不明'}</span>
        <span class="rname">${race.raceName}（${race.totalHorses}頭）<span style="color:#ff8080;font-size:11px;font-weight:700;margin-left:6px">💀本死に枠 #${di+1}</span></span>
        <span class="dbadge">💀${waku}枠</span>
        <span class="chev">▼</span>
      </div>
      <div class="rbody" style="padding:8px 12px">
        ${horseRows}
        <div class="res-drop" style="margin-top:10px;border:1.5px dashed rgba(255,255,255,.2);border-radius:8px;padding:10px;text-align:center;font-size:12px;color:var(--muted);cursor:pointer;transition:.15s" data-di="${di}">
          📋 結果PDFをここにドロップ → Xポスト生成
        </div>
        <div class="res-post-area" style="display:none;margin-top:8px"></div>
      </div>`;
    // ドロップゾーンのイベント
    const dropEl=div.querySelector('.res-drop');
    dropEl.addEventListener('dragover',e=>{e.preventDefault();dropEl.style.borderColor='var(--red)';dropEl.style.background='rgba(255,59,59,.08)';});
    dropEl.addEventListener('dragleave',()=>{dropEl.style.borderColor='rgba(255,255,255,.2)';dropEl.style.background='';});
    dropEl.addEventListener('drop',async e=>{
      e.preventDefault();
      dropEl.style.borderColor='rgba(255,255,255,.2)';dropEl.style.background='';
      const files=Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.pdf'));
      if(!files.length)return;
      dropEl.textContent='解析中...';
      const postArea=div.querySelector('.res-post-area');
      postArea.style.display='none';
      postArea.innerHTML='';
      for(const f of files){
        try{
          const text=await extractText(f);
          const rd=parseResultText(text);
          // このカードのrace/wakuで照合
          const match={race,scored,waku,score:fr?.avg,wVal:fr?.wVal};
          const postText=buildResultPostForCard(match,rd);
          if(postText){
            const cnt=[...postText].length;
            const pd=document.createElement('div');
            pd.innerHTML=`<div class="pprev" style="margin-top:6px"></div>
              <div class="cchar ${cnt>280?'over':''}">${cnt}文字</div>
              <button class="cbtn" style="margin-top:6px">𝕏 コピー</button>`;
            pd.querySelector('.pprev').textContent=postText;
            pd.querySelector('.cbtn').addEventListener('click',function(){
              const copy=t=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);};
              (navigator.clipboard?navigator.clipboard.writeText(postText).catch(()=>copy(postText)):Promise.resolve().then(()=>copy(postText)))
                .finally(()=>{this.textContent='✓ コピー完了！';this.classList.add('done');setTimeout(()=>{this.textContent='𝕏 コピー';this.classList.remove('done');},2000);});
            });
            postArea.appendChild(pd);
            postArea.style.display='block';
            dropEl.textContent='✓ 生成完了 — 別のPDFをドロップして更新可';
          } else {
            dropEl.textContent='⚠️ このレースの結果が見つかりませんでした';
          }
        }catch(err){
          dropEl.textContent='❌ エラー: '+err.message;
          console.error(err);
        }
      }
    });
    // クリックでもファイル選択
    dropEl.addEventListener('click',()=>{
      const inp=document.createElement('input');
      inp.type='file';inp.accept='.pdf';
      inp.onchange=async()=>{
        if(!inp.files.length)return;
        const dt=new DataTransfer();
        Array.from(inp.files).forEach(f=>dt.items.add(f));
        const ev=new DragEvent('drop',{dataTransfer:dt});
        dropEl.dispatchEvent(ev);
      };
      inp.click();
    });
    allrEl.appendChild(div);
  });
  // 死に枠なしレースは非表示（セクションタイトルも不要なら隠す）
  if(top10.length===0){
    allrEl.innerHTML='<p style="color:var(--muted);padding:12px;font-size:12px">死に枠認定レースなし</p>';
  }
}
// ===== 結果PDF処理 =====
function parseResultText(text) {
  const norm = text.normalize('NFKC');
  const lines = norm.split(/\n+/).map(l => l.trim()).filter(Boolean);

  // レース名・コース抽出（冒頭から）
  const head = norm.slice(0, 400);
  const venueMatch = head.match(/(中山|東京|阪神|京都|中京|福島|新潟|小倉|函館|札幌)\s*(\d{1,2})R/);
  const venue = venueMatch ? venueMatch[1] : '';
  const raceNum = venueMatch ? venueMatch[2] + 'R' : '';
  const titleMatch = head.match(/(\S+(?:ステークス|賞|杯|カップ|特別|記念))/);
  const raceTitle = titleMatch ? titleMatch[1] : '';
  const dateMatch = head.match(/(\d{4}年\d{1,2}月\d{1,2}日)/);
  const raceDate = dateMatch ? dateMatch[1].replace('年','年').replace('月','月') : '';

  // 着順行パース: 「着 枠 馬番 馬名 性齢 斤量 騎手 タイム ...」
  // または「中止 枠 馬番 馬名...」
  const results = [];
  const patResult = /^(\d{1,2}|中止|取消)\s+(\d)\s+(\d{1,2})\s+([ァ-ヶーｦ-ﾟ\u4E00-\u9FFF（）a-zA-Z]+)/;
  // 人気は行末付近にある（単人気欄）
  for (const l of lines) {
    const m = l.match(patResult);
    if (!m) continue;
    const finishing = m[1]; // 着順 or 中止/取消
    const wakuNo = parseInt(m[2]);
    const umaNo = parseInt(m[3]);
    const name = m[4];
    // 人気: 行末の数字（1〜15）
    const ninkiMatch = l.match(/(\d{1,2})\s*$/);
    const ninki = ninkiMatch ? parseInt(ninkiMatch[1]) : null;
    results.push({ finishing, waku: wakuNo, umaNo, name, ninki });
  }

  // 勝ち馬（1着）
  const winner = results.find(r => r.finishing === '1');

  return { venue, raceNum, raceTitle, raceDate, results, winner };
}

// カード個別用（match = {race, scored, waku} を直接受け取る）
function buildResultPostForCard(match, resultData) {
  const { venue, raceNum, raceTitle, raceDate, results } = resultData;
  if (!results.length) return null;

  const { race, waku } = match;
  const deadWaku = waku;

  // 会場・レース番号が一致するか確認
  if (race.venue !== venue || race.raceNum !== raceNum) {
    // 一致しなくてもカード個別ドロップなのでそのまま使う（ユーザーが意図的に投入）
    // ただし結果データの枠番で死に枠馬を探す
  }

  const deadHorses = results.filter(r => r.waku === deadWaku);
  if (!deadHorses.length) return null;

  const horseLines = deadHorses.map(h => {
    const fin = h.finishing === '中止' ? '中止' : h.finishing === '取消' ? '取消' : h.finishing + '着';
    const ninkiStr = h.ninki ? `${h.ninki}番人気` : '';
    return `🔲 ${h.name}（${ninkiStr}） → ${fin}`;
  }).join('\n');

  const allOut = deadHorses.every(h => {
    const f = parseInt(h.finishing);
    return isNaN(f) || f > 3;
  });
  const resultMark = allOut ? '✅ 的中！ 死に枠は眠ったまま。' : '❌ ハズレ。死に枠が生き返った。';

  const v = venue || race.venue;
  const rn = raceNum || race.raceNum;
  const tag = `${v}${rn}`;
  const courseTag = (race.courseKey || '').replace(/m$/, '');
  const rd = raceDate || race.raceDate || '';
  const rt = raceTitle || '';

  return `💀【死に枠 結果報告】 ${dateStr} ${venue} ${raceNumStr} ${race.surf||''}${race.dist||''}`

事前に${deadWaku}枠を死に枠認定⚠️
${horseLines}

${resultMark}

#競馬 #死に枠 #${v} #${tag} #${courseTag}`;
}

function buildResultPost(qualified, resultData) {
  const { venue, raceNum, raceTitle, raceDate, results } = resultData;
  if (!results.length) return null;

  // 死に枠認定レースと照合（会場+レース番号）
  const match = qualified.find(q => {
    const r = q.race;
    return r.venue === venue && r.raceNum === raceNum;
  });
  if (!match) return null;

  const deadWaku = match.waku;
  const deadHorses = results.filter(r => r.waku === deadWaku);
  if (!deadHorses.length) return null;

  // 死に枠馬の結果行
  const horseLines = deadHorses.map(h => {
    const fin = h.finishing === '中止' ? '中止' : h.finishing === '取消' ? '取消' : h.finishing + '着';
    const ninkiStr = h.ninki ? `${h.ninki}番人気` : '';
    return `🔲 ${h.name}（${ninkiStr}） → ${fin}`;
  }).join('\n');

  // 全馬圏外かチェック → 的中判定
  const allOut = deadHorses.every(h => {
    const f = parseInt(h.finishing);
    return isNaN(f) || f > 3;
  });
  const resultMark = allOut ? '✅ 的中！ 死に枠は眠ったまま。' : '❌ ハズレ。死に枠が生き返った。';

  const tag = `${venue}${raceNum}`;
  const courseTag = (match.race.courseKey || '').replace(/m$/, '');

 return `💀【死に枠 結果報告】 ${dateStr} ${venue} ${raceNumStr} ${race.surf||''}${race.dist||''}`

事前に${deadWaku}枠を死に枠認定⚠️
${horseLines}

${resultMark}

#競馬 #死に枠 #${venue} #${tag} #${courseTag}`;
}
