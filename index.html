<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>死に枠ハンター v4.6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ff3b3b;--red2:#ff7070;--green:#00e5a0;
  --bg:#0a0a0f;--card:#16161f;--border:rgba(255,255,255,0.1);
  --muted:rgba(255,255,255,0.45);--text:rgba(255,255,255,0.92);
}
body{font-family:system-ui,'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a0808,#0a0a1a);border-bottom:1px solid rgba(255,59,59,.3);padding:14px 18px;display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.hdr-t{font-size:17px;font-weight:900}.hdr-s{font-size:11px;color:var(--muted)}
.main{padding:18px;max-width:980px;margin:0 auto}
.dz-label{display:block;cursor:pointer}
.dz{border:2px dashed rgba(255,59,59,.45);border-radius:14px;padding:40px 20px;text-align:center;background:rgba(255,59,59,.03);margin-bottom:14px;transition:.15s;pointer-events:none}
.dz-label:hover .dz,.dz-label.over .dz{border-color:var(--red);background:rgba(255,59,59,.09)}
.dz .icon{font-size:42px;margin-bottom:8px}
.dz .t1{font-size:15px;font-weight:700;margin-bottom:4px}
.dz .t2{font-size:12px;color:var(--muted)}
.fitem{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.fst{margin-left:auto;font-size:11px;flex-shrink:0}
.ok{color:var(--green)}.er{color:var(--red2)}.wt{color:var(--muted)}
.clear-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px;display:none;float:right}
.clear-btn:hover{color:var(--red2)}
.ana-btn{display:block;width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:900;cursor:pointer;margin:10px 0 18px;font-family:inherit;transition:opacity .15s}
.ana-btn:disabled{opacity:.35;cursor:not-allowed}
.ana-btn:not(:disabled):hover{background:#e62e2e}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px}
.loading{text-align:center;padding:36px;display:none}
.spin{width:40px;height:40px;border:3px solid rgba(255,59,59,.2);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-s{font-size:12px;color:var(--muted);margin-top:5px}
.results{display:none}
.w3hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.w3badge{background:var(--red);color:#fff;font-size:10px;font-weight:900;padding:3px 9px;border-radius:20px;letter-spacing:1px}
.w3title{font-size:18px;font-weight:900}
.w3grid{display:flex;flex-direction:column;gap:12px}
.wcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;width:100%;box-sizing:border-box;position:relative;overflow:hidden}
.wcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
.wrank{font-size:10px;color:var(--red2);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.wrace{font-size:12px;color:var(--muted);margin-bottom:3px}
.wframe{font-size:28px;font-weight:900;color:var(--red);line-height:1;margin-bottom:4px}
.wscore{font-size:11px;color:var(--muted);margin-bottom:9px}
.wreason{font-size:11px;color:rgba(255,107,107,.85);line-height:1.65}
.pprev{background:#0d1117;border:1px solid rgba(99,179,237,.3);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.9;white-space:pre-wrap;word-break:break-all;margin:10px 0;color:#c9d1d9;font-family:"Hiragino Sans","Yu Gothic",monospace}
.cchar{font-size:10px;color:var(--muted);text-align:right;margin-top:4px}
.cchar.over{color:var(--red2)}
.cbtn{width:100%;padding:12px;background:#1d9bf0;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:background .2s}
.cbtn:hover{background:rgba(255,59,59,.25)}
.cbtn.done{background:#17bf63}
.arttl{font-size:14px;font-weight:700;margin-bottom:13px;border-top:1px solid var(--border);padding-top:20px}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.rchdr{padding:12px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.rchdr:hover{background:rgba(255,255,255,.03)}
.rtag{background:rgba(255,255,255,.08);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;flex-shrink:0}
.rname{font-size:13px;font-weight:700;flex:1}
.dbadge{background:rgba(255,59,59,.2);color:var(--red2);border-radius:20px;font-size:10px;font-weight:700;padding:2px 8px;flex-shrink:0}
.chev{color:var(--muted);font-size:11px;transition:.2s;flex-shrink:0}
.rcard.open .chev{transform:rotate(180deg)}
.rbody{display:none;padding:0 16px 16px}
.rcard.open .rbody{display:block}
.stbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.stbl th{background:rgba(255,255,255,.06);padding:6px 8px;text-align:center;font-weight:700;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.stbl th:first-child{text-align:left}
.stbl td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;text-align:center}
.stbl td:first-child{text-align:left}
.stbl tr:last-child td{border-bottom:none}
.stbl tr.dead-row{background:rgba(255,59,59,.1)}
.stbl tr.dead-row td{color:#ff9090}
.stbl tr.dead-row td:first-child{font-weight:700}
.stbl tr.top-row{background:rgba(0,229,160,.07)}
.score-bar{display:flex;align-items:center;gap:4px}
.bar-mini{flex:1;background:rgba(255,255,255,.08);border-radius:3px;height:14px;max-width:80px}
.bar-mini-fill{height:100%;border-radius:3px}
.bd-fill{background:rgba(255,59,59,.6)}
.bt-fill{background:rgba(0,229,160,.5)}
.bn-fill{background:rgba(100,130,210,.45)}
.pace-tag{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;background:rgba(255,255,255,.1)}
.err{background:rgba(255,59,59,.15);border:1px solid rgba(255,59,59,.4);border-radius:9px;padding:12px 16px;font-size:13px;color:var(--red2);margin-bottom:14px;display:none}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
let files = [];

const fi = document.getElementById('fi');
const dzL = document.getElementById('dz-label');
const flist = document.getElementById('flist');
const anaBtn = document.getElementById('ana-btn');
const clearBtn = document.getElementById('clear-btn');
const loading = document.getElementById('loading');
const ldS = document.getElementById('ld-s');
const results = document.getElementById('results');
const w3grid = document.getElementById('w3grid');
const allr = document.getElementById('allr');
const errD = document.getElementById('err');

dzL.addEventListener('dragover', e => { e.preventDefault(); dzL.classList.add('over'); });
dzL.addEventListener('dragleave', () => dzL.classList.remove('over'));
dzL.addEventListener('drop', e => { e.preventDefault(); dzL.classList.remove('over'); handleFiles(e.dataTransfer.files); });
fi.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fs) {
  for (let f of fs) {
    if (f.type !== 'application/pdf') continue;
    files.push({ file: f, status: 'wt' });
  }
  renderFiles();
}

function renderFiles() {
  flist.innerHTML = '';
  files.forEach((f, i) => {
    const d = document.createElement('div');
    d.className = 'fitem';
    const s = f.status === 'ok' ? '<span class="ok">✓ 解析済</span>' : f.status === 'er' ? '<span class="er">⚠ エラー</span>' : '<span class="wt">待機中</span>';
    d.innerHTML = `<span>📄</span> <strong>${f.file.name}</strong> <div class="fst">${s}</div>`;
    flist.appendChild(d);
  });
  anaBtn.disabled = files.length === 0;
  clearBtn.style.display = files.length > 0 ? 'block' : 'none';
}

function clearAll() {
  files = [];
  renderFiles();
  results.style.display = 'none';
  errD.style.display = 'none';
}

anaBtn.onclick = async () => {
  anaBtn.disabled = true;
  loading.style.display = 'block';
  results.style.display = 'none';
  errD.style.display = 'none';
  let allRaces = [];
  for (let i = 0; i < files.length; i++) {
    ldS.textContent = `${i + 1} / ${files.length} 解析中: ${files[i].file.name}`;
    try {
      const rs = await parseJRAPDF(files[i].file);
      allRaces.push(...rs);
      files[i].status = 'ok';
    } catch (e) {
      console.error(e);
      files[i].status = 'er';
    }
  }
  renderFiles();
  processRaces(allRaces);
  loading.style.display = 'none';
};

async function parseJRAPDF(file) {
  const data = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  return extractRaces(text);
}

function extractRaces(txt) {
  const races = [];
  const lines = txt.split('\n');
  let cur = null;
  const raceHeaderRegex = /(\d{4}年\d{1,2}月\d{1,2}日)\s+(\d{1,2}回)?(中山|東京|阪神|中京|福島|京都|小倉|新潟|函館|札幌)(\d{1,2})日\s+(\d{1,2})R/i;

  lines.forEach(ln => {
    const m = ln.match(raceHeaderRegex);
    if (m) {
      if (cur) races.push(cur);
      const surf = ln.includes('芝') ? '芝' : ln.includes('ダート') ? 'ダート' : '';
      const distM = ln.match(/(\d{4})m/);
      cur = {
        raceDate: m[1], venue: m[3], raceNum: m[5] + 'R', surf, dist: distM ? distM[1] + 'm' : '',
        courseKey: m[3] + surf + (distM ? distM[1] + 'm' : ''), horses: []
      };
      if (cur.venue === '京都' && cur.surf === '芝') {
        if (ln.includes('内')) cur.courseKey += '内'; else if (ln.includes('外')) cur.courseKey += '外';
      }
    }
    if (cur) {
      const hm = ln.match(/(\d{1,2})\s+(\d{1,2})\s+([^\s\d]+)\s+([^\s\d]+)\s+[\d\.]+\s+[\d\.]+\s+([\d\.]+)/);
      if (hm) {
        cur.horses.push({
          waku: hm[1], horseNum: hm[2], name: hm[3], jockey: hm[4],
          odds: parseFloat(hm[5]), popular: 0, rank: null
        });
      }
      const resM = ln.match(/([^\s]+)\s+\(([\d]{1,2})番人気\)\s+→\s+(\d{1,2})着/);
      if (resM) {
        const h = cur.horses.find(x => x.name === resM[1]);
        if (h) { h.popular = parseInt(resM[2]); h.rank = parseInt(resM[3]); }
      }
    }
  });
  if (cur) races.push(cur);
  races.forEach(r => {
    const sorted = [...r.horses].sort((a, b) => a.odds - b.odds);
    sorted.forEach((h, idx) => h.popular = idx + 1);
  });
  return races;
}

function processRaces(rs) {
  const processed = rs.map(r => {
    const dbC = DB[r.courseKey];
    if (!dbC) return { ...r, err: 'データ未登録' };
    const frames = {};
    for (let i = 1; i <= 8; i++) {
      const hInF = r.horses.filter(h => h.waku == i);
      if (hInF.length === 0) continue;
      let score = 0, reasons = [];
      const wVal = dbC.waku[i] || 20;
      score += wVal; reasons.push(`枠(${i}):${wVal}`);
      hInF.forEach(h => {
        const jVal = dbC.jockey[h.jockey] || 20;
        score += jVal; reasons.push(`${h.name}:${jVal}`);
      });
      frames[i] = { score: parseFloat(score.toFixed(1)), reasons, horses: hInF };
    }
    return { ...r, frames };
  });

  const deadRaces = processed.filter(r => !r.err).map(r => {
    const fArr = Object.entries(r.frames).map(([w, d]) => ({ waku: w, ...d }));
    fArr.sort((a, b) => a.score - b.score);
    const worst = fArr[0];
    const top5Count = worst.horses.filter(h => h.popular <= 5).length;
    let skip = false, skipReason = "";
    if (top5Count >= 2) { skip = true; skipReason = "5人気以内2頭以上"; }
    if (worst.score >= 36) { skip = true; skipReason = "スコア36以上"; }
    return { ...r, worstWaku: worst.waku, worstScore: worst.score, worstReasons: worst.reasons, skip, skipReason };
  });

  results.style.display = 'block';
  w3grid.innerHTML = ''; allr.innerHTML = '';
  const valid = deadRaces.filter(r => !r.skip).sort((a, b) => a.worstScore - b.worstScore).slice(0, 10);
  
  if (valid.length === 0) {
    w3grid.innerHTML = '<div class="hint">条件に合致する「死に枠」は見つかりませんでした。</div>';
  } else {
    valid.forEach((r, i) => {
      const postText = buildPost(r, r.frames[r.worstWaku], i + 1, r.worstWaku);
      const resPostText = buildResultPost(r, r.frames[r.worstWaku], r.worstWaku);
      const card = document.createElement('div');
      card.className = 'wcard';
      card.innerHTML = `
        <div class="wrank">RANK ${i + 1}</div>
        <div class="wrace">${r.venue}${r.raceNum} ${r.surf}${r.dist}</div>
        <div class="wframe">${r.worstWaku}枠</div>
        <div class="wscore">SCORE: ${r.worstScore}</div>
        <div class="wreason">${r.worstReasons.join(' / ')}</div>
        <div class="pprev" id="p-${i}">${postText}</div>
        <button class="cbtn" onclick="copyTxt('p-${i}', this)">募集文をコピー</button>
        <div style="margin-top:10px"></div>
        <div class="pprev" id="res-${i}">${resPostText}</div>
        <button class="cbtn" style="background:#666" onclick="copyTxt('res-${i}', this)">結果報告をコピー</button>
      `;
      w3grid.appendChild(card);
    });
  }
  deadRaces.forEach(r => {
    const rc = document.createElement('div');
    rc.className = 'rcard';
    const skipB = r.skip ? `<span class="dbadge">${r.skipReason}</span>` : '';
    rc.innerHTML = `<div class="rchdr" onclick="this.parentElement.classList.toggle('open')">
      <span class="rtag">${r.venue}${r.raceNum}</span>
      <span class="rname">${r.surf}${r.dist}</span>
      ${skipB}
      <span class="chev">▼</span>
    </div>
    <div class="rbody"><table class="stbl"><tr><th>枠</th><th>馬・騎手</th><th>スコア</th></tr>
    ${Object.entries(r.frames).map(([w, d]) => `<tr class="${w == r.worstWaku ? 'dead-row' : ''}"><td>${w}</td><td>${d.horses.map(h => h.name).join('<br>')}</td><td>${d.score}</td></tr>`).join('')}
    </table></div>`;
    allr.appendChild(rc);
  });
}

function buildPost(race, scored, rank, waku) {
    const worst = waku;
    const fr = scored;
    const dateStr = race.raceDate || '';
    const raceNumStr = race.raceNum || '';
    const venue = race.venue;
    const horses = fr?.horses || [];
    const horseLines = horses.map(h => `${h.name} ${h.odds != null && h.odds < 999 ? h.odds + '倍' : ''}`).join('\n');
    const courseTag = (race.courseKey || '').replace(/m$/, '');
    const raceTag = `${venue}${raceNumStr}`;

    // タイトル / 本文 / ハッシュタグ の間に空行を挿入
    return `【死に枠】 ${dateStr} ${venue} ${raceNumStr} ${race.surf||''}${race.dist||''}

${worst}枠
${horseLines}

#競馬 #死に枠 #${venue} #${raceTag} #${courseTag}`;
}

function buildResultPost(race, scored, waku) {
    const fr = scored;
    const dateStr = race.raceDate || '';
    const venue = race.venue;
    const raceNumStr = race.raceNum || '';
    const surf = race.surf || '';
    const dist = race.dist || '';
    const horseResults = (fr?.horses || []).map(h => {
        const rankStr = h.rank ? `${h.rank}着` : '着順不明';
        const popularStr = h.popular ? `(${h.popular}番人気)` : '';
        const isWin = (h.rank && parseInt(h.rank) > 3) ? ' ✅ 的中！' : (h.rank ? ' ❌ 不的中' : '');
        return `${h.name} ${popularStr} → ${rankStr}${isWin}`;
    }).join('\n');
    const courseTag = (race.courseKey || '').replace(/m$/, '');
    const raceTag = `${venue}${raceNumStr}`;

    // タイトル / 本文 / ハッシュタグ の間に空行を挿入
    return `💀 【死に枠 結果報告】 ${dateStr} ${venue} ${raceNumStr} ${surf}${dist}

${waku}枠
${horseResults}

#競馬 #死に枠 #${venue} #${raceTag} #${courseTag}`;
}

async function copyTxt(id, btn) {
  const t = document.getElementById(id).innerText;
  await navigator.clipboard.writeText(t);
  const old = btn.innerText;
  btn.innerText = 'COPIED!';
  btn.classList.add('done');
  setTimeout(() => { btn.innerText = old; btn.classList.remove('done'); }, 1500);
}
</script>
